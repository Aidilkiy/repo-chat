server {
    listen 80;

    # Same path-based routing as the Vite dev proxy (vite.config.ts) — this is the
    # container-world equivalent, and the role a Kubernetes Ingress will take over later.
    location /api/health {
        rewrite ^/api/health$ /health break;
        proxy_pass http://repo-chat-ingest-service:8788;
    }

    location /api/ingest {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://repo-chat-ingest-service:8788;
    }

    location /api/query {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://repo-chat-query-service:8789;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
