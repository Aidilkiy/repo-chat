name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingest-service, query-service, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install
        working-directory: services/${{ matrix.service }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: services/${{ matrix.service }}

      - name: Build
        run: npm run build
        working-directory: services/${{ matrix.service }}
