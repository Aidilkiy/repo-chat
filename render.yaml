services:
  - type: web
    name: repo-chat
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GITHUB_TOKEN
        sync: false
